name: ✨ Aesthetic / Auto-Formatter
on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    name: ✨ Style Clean / Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Initialize / Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: ⚙️ Runtime / Setup Node.js Context
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: 📦 Environment / Install Tooling
        run: npm install
      - name: ✨ Aesthetics / Harmonize Code Format
        run: npm run format > prettier-output.txt || true
        
      - name: 🏛️ Dashboard / Generate Aesthetic Audit
        run: node scripts/prettier-report.js
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      - name: 📤 Persistence / Commit Aesthetic Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code with prettier [skip ci]"
          commit_user_name: Nexo Automator
          commit_user_email: automator@nexo.ai
          commit_author: nexowebai <248153502+nexowebai@users.noreply.github.com>
