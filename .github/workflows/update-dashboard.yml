name: Update Engineering Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'src/features/**'
      - 'scripts/generate-pulse-dashboard.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Generate Dashboard
        run: node scripts/generate-pulse-dashboard.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update engineering dashboard [skip ci]" && git push)
