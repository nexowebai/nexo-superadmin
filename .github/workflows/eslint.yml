name: Strict Codebase Check
on: 
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eslint:
    name: 🛡️ NX-Audit / ESLint & Integrity
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Initialize / Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Dependency / Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using Node 22 for stability and latest features
          cache: 'npm'

      - name: 📦 Environment / Install Workspace Dependencies
        run: npm install

      # Automated PR review with line-by-line comments (only for changed lines)
      - name: 🧪 Analysis / Run Real-time PR Reviewdog
        uses: reviewdog/action-eslint@v1
        continue-on-error: true # Don't fail the build here, we want the custom report to decide
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: 'src/**/*.{ts,tsx,js,jsx}'
          filter_mode: added # Comments only on new/changed lines
          fail_level: error # Updated from deprecated fail_on_error

      - name: 🏷️ Reporting / Export JSON Intelligence
        run: npx eslint src/**/*.{js,jsx} --format json --output-file eslint-results.json
        continue-on-error: true

      - name: 🏛️ Dashboard / Generate Executive Audit Report
        run: node scripts/eslint-report.js
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

