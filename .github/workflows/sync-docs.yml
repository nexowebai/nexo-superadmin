name: 📚 Feature Docs Sync

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'src/features/**'
      - 'scripts/sync-feature-docs.js'
  pull_request:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'src/features/**'

jobs:
  sync-docs:
    name: 📚 Documentation / Sync Features
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push back the updated READMEs

    steps:
      - name: 📥 Initialize / Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} # Checkout the branch for PRs
          
      - name: ⚙️ Runtime / Setup Node.js Context
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Environment / Install Tooling Dependencies
        run: npm install # Standard install to ensure script runtime dependencies if any

      - name: 🔄 Automation / Orchestrate Feature Doc Sync
        run: npm run docs:sync

      - name: ⚡ Performance / Production Bundle Audit
        run: npm run perf:audit

      - name: 📜 Release / Synchronize Changelog
        if: github.event_name == 'push'
        run: npm run release:log

      - name: 📤 Resolution / Commit Engineering Intelligence
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "engineering: 🛰️ Synchronize docs, performance metrics, and changelog"
          file_pattern: 'src/features/**/README.md README.md CHANGELOG.md'
          branch: ${{ github.head_ref || github.ref }}
